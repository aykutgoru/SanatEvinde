<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitar Repertuarı | Aykut Görü</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }
        .container { max-width: 900px; margin: 40px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #0D2344; text-align: center; font-weight: 700; margin-bottom: 30px; }
        .table-of-contents { background: #f9f9f9; padding: 25px; border-radius: 10px; border-left: 5px solid #0D2344; margin-bottom: 50px; }
        .table-of-contents h2 { font-size: 1.2rem; margin-top: 0; color: #0D2344; }
        .table-of-contents ul { list-style: none; padding: 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .table-of-contents a { text-decoration: none; color: #555; font-weight: 500; transition: 0.3s; }
        .table-of-contents a:hover { color: #d32f2f; padding-left: 5px; }
        .controls { background: #0D2344; color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 30px; position: sticky; top: 10px; z-index: 100; }
        .controls button { background: white; color: #0D2344; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #chord-area { font-family: 'Courier Prime', monospace; white-space: pre; font-size: 1.1rem; line-height: 1.8; }
        .chord { color: #d32f2f; font-weight: bold; }
        .song-block { padding-top: 60px; margin-top: 20px; }
        .song-title { font-size: 1.5rem; color: #0D2344; border-bottom: 1px solid #eee; margin-bottom: 20px; display: block; }
        .back-link { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #888; font-size: 0.8rem; }
    </style>
</head>
<body>
<div class="container">
    <a href="calismalarim.html" class="back-link">← ÇALIŞMALARA DÖN</a>
    <h1>GİTAR REPERTUARI</h1>
    <div class="table-of-contents">
        <h2>Şarkı Listesi</h2>
        <ul>
            <li><a href="#sarki1">1. Caddelerde Rüzgar</a></li>
            <li><a href="#sarki2">2. Akdeniz Akşamları</a></li>
        </ul>
    </div>
    <div class="controls">
        <span>TON:</span>
        <button onclick="transpose(-1)">-</button>
        <button onclick="transpose(1)">+</button>
    </div>
    <div id="chord-area">
        <div id="sarki1" class="song-block">
            <strong class="song-title">Caddelerde Rüzgar</strong>
<span class="chord">Am</span>             <span class="chord">Dm</span>
Caddelerde rüzgar, aklımda aşkın
<span class="chord">G</span>              <span class="chord">C</span>
Gece yarılarında, eski şarkılar
        </div>
        <div id="sarki2" class="song-block">
            <strong class="song-title">Akdeniz Akşamları</strong>
<span class="chord">Am</span>             <span class="chord">G</span>
Akdeniz akşamları bir başka oluyor
<span class="chord">F</span>              <span class="chord">E</span>
Hele bir de aylardan temmuz ise...
        </div>
    </div>
</div>
<script>
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    function transpose(steps) {
        const chords = document.querySelectorAll('.chord');
        chords.forEach(el => {
            let chordText = el.innerText;
            el.innerText = chordText.replace(/[A-G][#b]?/g, (match) => {
                let note = match;
                if (note === 'Bb') note = 'A#'; if (note === 'Eb') note = 'D#';
                if (note === 'Ab') note = 'G#'; if (note === 'Db') note = 'C#';
                if (note === 'Gb') note = 'F#';
                let index = notes.indexOf(note);
                if (index === -1) return match;
                let newIndex = (index + steps + 12) % 12;
                return notes[newIndex];
            });
        });
    }
</script>
</body>
</html>
