<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repertuarım | Aykut Görü</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background-color: #ffffff; color: #1a1a1a; }
        .container { max-width: 1000px; margin: 60px auto; padding: 20px; }
        
        h1 { font-size: 2.5rem; letter-spacing: 8px; text-align: center; font-weight: 300; text-transform: uppercase; margin-bottom: 50px; border-bottom: 1px solid #eee; padding-bottom: 20px; }

        /* ŞARKI LİSTESİ: Alt alta dizilimi garanti eder */
        .song-list {
            display: flex;
            flex-direction: column; /* Şarkıları alt alta diz */
            flex-wrap: wrap;       /* Sığmazsa yana geç */
            max-height: 1200px;    /* Burası önemli: 20-25 şarkıdan sonra sağa geçmesini sağlar */
            padding: 0;
            list-style: none;
            gap: 5px 80px;         /* Satır ve sütun arası boşluk */
        }

        .song-list li { 
            width: 45%;            /* Her şarkı sütunun neredeyse yarısını kaplasın */
            border-bottom: 1px solid #f0f0f0; 
            padding: 12px 0; 
        }
        
        .song-list a {
            text-decoration: none;
            color: #333;
            font-size: 1.1rem;
            display: block;
            transition: 0.3s ease;
        }

        .song-list a:hover { 
            color: #d32f2f; 
            padding-left: 10px; 
        }

        .song-number { 
            color: #ccc; 
            font-size: 0.8rem; 
            margin-right: 15px; 
        }

        .back-link { text-decoration: none; color: #999; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }

        /* Mobil ekranda her şeyi tek sütun yap */
        @media (max-width: 768px) {
            .song-list { max-height: none; }
            .song-list li { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="calismalarim.html" class="back-link">← GERİ DÖN</a>
    <h1>REPERTUARIM</h1>

    <ul class="song-list">
        <li><a href="caddelerde-ruzgar.html"><span class="song-number">01</span> Caddelerde Rüzgar</a></li>
        <li><a href="akdeniz-aksamlari.html"><span class="song-number">02</span> Akdeniz Akşamları</a></li>
        </ul>
</div>

</body>
</html>
