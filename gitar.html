<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repertuarım | Aykut Görü</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; background-color: #ffffff; color: #1a1a1a; }
        .container { max-width: 1000px; margin: 60px auto; padding: 20px; }
        
        h1 { font-size: 2.5rem; letter-spacing: 8px; text-align: center; font-weight: 300; text-transform: uppercase; margin-bottom: 50px; border-bottom: 1px solid #eee; padding-bottom: 20px; }

        /* ŞARKI LİSTESİ SÜTUN YAPISI */
        .song-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Yan yana 2 sütun */
            gap: 20px 60px; /* Satır ve Sütun boşluğu */
            padding: 0;
            list-style: none;
        }

        .song-list li { border-bottom: 1px solid #f0f0f0; padding: 10px 0; }
        
        .song-list a {
            text-decoration: none;
            color: #333;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            transition: 0.3s;
        }

        .song-list a:hover { color: #d32f2f; transform: translateX(5px); }
        .song-number { color: #ccc; font-size: 0.9rem; margin-right: 15px; }

        .back-link { text-decoration: none; color: #999; font-size: 0.8rem; letter-spacing: 2px; }
        
        /* Mobil Ekranlarda Tek Sütun Olsun */
        @media (max-width: 768px) {
            .song-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="calismalarim.html" class="back-link">← GERİ DÖN</a>
    <h1>REPERTUARIM</h1>

    <ul class="song-list">
        <li>
            <a href="caddelerde-ruzgar.html">
                <span><span class="song-number">01</span> Caddelerde Rüzgar</span>
                <span>→</span>
            </a>
        </li>
        <li>
            <a href="akdeniz-aksamlari.html">
                <span><span class="song-number">02</span> Akdeniz Akşamları</span>
                <span>→</span>
            </a>
        </li>
        </ul>
</div>

</body>
</html>
