<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çalışmalarım | Aykut Görü</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background-color: #ffffff; }
        header { padding: 80px 20px 40px 20px; text-align: center; }
        header h1 { font-size: 2.2rem; letter-spacing: 5px; font-weight: 300; color: #1a1a1a; text-transform: uppercase; }
        
        .portfolio-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; width: 100%; }
        @media (max-width: 768px) { .portfolio-grid { grid-template-columns: 1fr; } }

        .portfolio-item { position: relative; overflow: hidden; aspect-ratio: 16 / 10; cursor: pointer; }
        .portfolio-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 35, 68, 0.7); /* Lacivert transparan */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: 0.4s; color: white;
        }
        .portfolio-item:hover .overlay { opacity: 1; }
        .portfolio-item:hover img { transform: scale(1.05); }
        .overlay h2 { font-size: 1.8rem; font-weight: 700; margin: 0; letter-spacing: 2px; }
        
        .back-home { position: absolute; top: 30px; left: 30px; text-decoration: none; color: #333; font-size: 0.8rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <a href="index.html" class="back-home">← ANA SAYFA</a>

    <header>
        <h1>ÇALIŞMALARIM</h1>
    </header>

    <div class="portfolio-grid">
        <div class="portfolio-item" onclick="location.href='gitar.html'">
            <img src="https://images.unsplash.com/photo-1525201548942-d8732f6617a0?auto=format&fit=crop&w=800&q=80">
            <div class="overlay"><h2>GİTAR</h2><p>Akorlar & Arşiv</p></div>
        </div>
        <div class="portfolio-item" onclick="location.href='piyano.html'">
            <img src="https://images.unsplash.com/photo-1520529612723-e4c1e099a647?auto=format&fit=crop&w=800&q=80">
            <div class="overlay"><h2>PİYANO</h2><p>Egzersizler</p></div>
        </div>
        <div class="portfolio-item" onclick="location.href='basarilar.html'">
            <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?auto=format&fit=crop&w=800&q=80">
            <div class="overlay"><h2>BAŞARILAR</h2><p>Sertifikalar</p></div>
        </div>
        <div class="portfolio-item" onclick="location.href='teori.html'">
            <img src="https://images.unsplash.com/photo-1507838596058-a4628ee7e28a?auto=format&fit=crop&w=800&q=80">
            <div class="overlay"><h2>TEORİ</h2><p>Müzik Bilgisi</p></div>
        </div>
    </div>

</body>
</html>
