<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İntihaşk - Onur Can Özcan</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #333; --chord: #d32f2f; --panel: #f8f9fa; }
        .dark-mode { --bg: #1a1a1a; --text: #f0f0f0; --chord: #ff4d4d; --panel: #2d2d2d; }
        
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding: 0; }
        .container { max-width: 700px; margin: 40px auto; padding: 20px; }
        .back-nav a { text-decoration: none; color: #999; font-size: 0.8rem; text-transform: uppercase; }
        
        h1 { font-size: 1.8rem; margin-bottom: 5px; text-align: center; }
        .artist { text-align: center; color: #888; margin-bottom: 30px; letter-spacing: 1px; }

        .controls { 
            background: var(--panel); padding: 15px; border-radius: 12px; 
            display: flex; justify-content: space-around; align-items: center; margin-bottom: 30px;
        }
        .controls button { 
            background: #0D2344; color: white; border: none; padding: 10px 15px; 
            border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        #chord-content { 
            font-family: 'Courier Prime', monospace; white-space: pre; 
            font-size: 1.15rem; line-height: 2.2; overflow-x: auto;
        }
        .chord { color: var(--chord); font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="back-nav"><a href="gitar.html">← REPERTUARA DÖN</a></div>
    <h1>YARAMIZDA KALSIN</h1>
    <div class="artist">ONUR CAN ÖZCAN</div>

    <div class="controls">
        <button onclick="transpose(-1)">- YARIM SES</button>
        <button onclick="toggleDark()">🌙 GECE MODU</button>
        <button onclick="transpose(1)">+ YARIM SES</button>
    </div>

    <div id="chord-content">
<span class="chord">Am</span>                    <span class="chord">E</span>
Bir tek dileğim var mutlusundur umarım
<span class="chord">F</span>                   <span class="chord">E</span>
Yüzünü unuttum ama sesin hala canım
<span class="chord">Dm</span>                   <span class="chord">Am</span>
Benim için hayat hala devam ediyor
<span class="chord">F</span>                    <span class="chord">E</span>
Senin için bitti her şey biliyorum
    </div>
</div>

<script>
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    function transpose(steps) {
        document.querySelectorAll('.chord').forEach(el => {
            el.innerText = el.innerText.replace(/[A-G][#b]?/g, (match) => {
                let note = match === 'Bb' ? 'A#' : (match === 'Eb' ? 'D#' : (match === 'Ab' ? 'G#' : (match === 'Db' ? 'C#' : (match === 'Gb' ? 'F#' : match))));
                let index = notes.indexOf(note);
                if (index === -1) return match;
                return notes[(index + steps + 12) % 12];
            });
        });
    }
    function toggleDark() { document.body.classList.toggle('dark-mode'); }
</script>
</body>
</html>
