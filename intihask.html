<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İntihaşk - Onur Can Özcan</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --chord: #d32f2f; --panel: #fcfcfc; --border: #eee; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: 1fr 280px; gap: 40px; }
        .header { grid-column: 1 / -1; text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2.2rem; color: #0D2344; margin: 0; }
        .artist { color: #888; text-transform: uppercase; letter-spacing: 2px; }

        .top-panel { grid-column: 1 / -1; background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .transpose-bar { display: flex; gap: 10px; }
        .transpose-bar span { font-weight: bold; cursor: pointer; padding: 5px 8px; border-bottom: 2px solid transparent; transition: 0.3s; }
        .active-note { color: var(--chord) !important; border-bottom: 2px solid var(--chord) !important; }

        .font-btns button { border: 1px solid #ccc; background: white; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-left: 5px; }

        .lyrics-area { border-right: 1px solid var(--border); padding-right: 30px; }
        .intro-box { background: #f9f9f9; border: 1px dashed #ccc; padding: 15px; margin: 20px 0; font-family: 'Courier Prime', monospace; font-weight: bold; color: var(--chord); }
        
        #chords { font-family: 'Courier Prime', monospace; white-space: pre; font-size: 1.2rem; line-height: 2.8; }
        /* Akorların kelime üstünde durması için */
        .chord { color: var(--chord); font-weight: bold; display: inline-block; position: absolute; margin-top: -1.3em; }

        .sidebar-box { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 8px; position: sticky; top: 20px; }
        .ritim-label { font-weight: bold; border-bottom: 2px solid var(--chord); margin-bottom: 10px; display: inline-block; }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } .lyrics-area { border: none; padding: 0; } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div style="text-align: left;"><a href="repertuar.html" style="text-decoration:none; color:#999; font-size:0.8rem;">← REPERTUAR</a></div>
        <h1>İNTİHAŞK</h1>
        <div class="artist">Onur Can Özcan</div>
    </div>

    <div class="top-panel">
        <div class="transpose-bar">
            <span onclick="transposeTo('C', this)">C</span>
            <span onclick="transposeTo('C#', this)">C#</span>
            <span onclick="transposeTo('D', this)">D</span>
            <span onclick="transposeTo('D#', this)">D#</span>
            <span onclick="transposeTo('E', this)">E</span>
            <span onclick="transposeTo('F', this)">F</span>
            <span onclick="transposeTo('F#', this)">F#</span>
            <span onclick="transposeTo('G', this)">G</span>
            <span onclick="transposeTo('G#', this)">G#</span>
            <span class="active-note" onclick="transposeTo('A', this)">A</span>
            <span onclick="transposeTo('A#', this)">A#</span>
            <span onclick="transposeTo('B', this)">B</span>
        </div>
        <div class="font-btns">
            <button onclick="resize(2)">A+</button>
            <button onclick="resize(-2)">A-</button>
        </div>
    </div>

    <div class="lyrics-area">
        <div style="color: #999; font-weight: bold;">[INTRO]</div>
        <div class="intro-box"><span class="c-note">Am</span> - <span class="c-note">E</span> - <span class="c-note">F</span> - <span class="c-note">E</span>  (x2)</div>
        
        <div id="chords">
<span class="chord c-note">Am</span>                    <span class="chord c-note">E</span>
Bir tek dileğim var mutlusundur umarım
<span class="chord c-note">F</span>                   <span class="chord c-note">E</span>
Yüzünü unuttum ama sesin hala canım

<span class="chord c-note">Dm</span>                   <span class="chord c-note">Am</span>
Benim için hayat hala devam ediyor
<span class="chord c-note">F</span>                    <span class="chord c-note">E</span>
Senin için bitti her şey biliyorum
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-box">
            <div class="ritim-label">RİTİM</div>
            <div style="font-family: 'Courier Prime'; letter-spacing: 2px; font-weight:bold;">V  V  ^  ^  V  ^</div>
            <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">4/4 Slow Pop</p>
        </div>
    </div>
</div>

<script>
    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    let currentKeyIndex = 9; // Şarkı A (Am) tonda başlıyor

    function transposeTo(targetNote, el) {
        const targetIndex = notes.indexOf(targetNote);
        const diff = targetIndex - currentKeyIndex;
        if (diff === 0) return;

        // Görsel efekt: Alt çizgiyi güncelle
        document.querySelectorAll('.transpose-bar span').forEach(s => s.classList.remove('active-note'));
        el.classList.add('active-note');

        // Bütün akorları güncelle
        document.querySelectorAll('.c-note').forEach(chordEl => {
            let originalText = chordEl.innerText;
            // Akorun kök notasını (A, C#, vb.) ve eklerini (m, 7, vb.) ayır
            chordEl.innerText = originalText.replace(/[A-G][#b]?/g, (match) => {
                let note = match;
                if (note === 'Bb') note = 'A#'; if (note === 'Eb') note = 'D#';
                if (note === 'Ab') note = 'G#'; if (note === 'Db') note = 'C#';
                if (note === 'Gb') note = 'F#';
                
                let idx = notes.indexOf(note);
                let newIdx = (idx + diff + 12) % 12;
                return notes[newIdx];
            });
        });
        currentKeyIndex = targetIndex;
    }

    function resize(delta) {
        let el = document.getElementById('chords');
        let cur = parseInt(window.getComputedStyle(el).fontSize);
        el.style.fontSize = (cur + delta) + 'px';
    }
</script>
</body>
</html>
