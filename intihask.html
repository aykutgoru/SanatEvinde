<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İntihaşk - Onur Can Özcan</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.4; background: #fff; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Kontrol Paneli */
        .ust-panel { background: #f9f9f9; padding: 15px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn { padding: 5px 10px; cursor: pointer; font-weight: bold; }
        .akor-btn { border: none; background: none; font-weight: bold; cursor: pointer; padding: 5px; font-size: 1rem; }
        .active { color: red; border-bottom: 2px solid red; }

        /* Ritim Kutusu (Sağ Taraf) */
        .ritim-kutusu { border: 2px solid #333; padding: 15px; width: 220px; float: right; margin-left: 20px; text-align: center; border-radius: 10px; }
        .ritim-title { font-weight: bold; color: green; margin-bottom: 10px; display: block; }
        .ritim-notasyon { font-family: monospace; font-size: 1.4rem; text-align: left; display: inline-block; line-height: 1; }
        .cizgi { border-top: 2px solid #000; margin: 4px 0; width: 100%; }

        /* Şarkı Alanı */
        .intro { background: #eee; padding: 10px; margin-bottom: 20px; font-weight: bold; color: red; font-family: monospace; font-size: 12pt; }
        #sarki-alani { font-family: monospace; white-space: pre; font-size: 12pt; line-height: 2.2; position: relative; margin-top: 30px; }
        .akor { color: red; font-weight: bold; position: absolute; margin-top: -1.1em; display: inline-block; }

        @media (max-width: 800px) { .ritim-kutusu { float: none; width: 100%; margin: 0 0 20px 0; } }
    </style>
</head>
<body>
