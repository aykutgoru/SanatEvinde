<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İntihaşk - Onur Can Özcan | Repertuarım</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --chord: #d32f2f; --panel: #fcfcfc; --border: #eee; }
        .dark-mode { --bg: #121212; --text: #e0e0e0; --chord: #ff5252; --panel: #1e1e1e; --border: #333; }
        
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: 1fr 280px; gap: 40px; }
        
        /* Geri Dön Linki */
        .back-nav { grid-column: 1 / -1; margin-bottom: 10px; }
        .back-nav a { text-decoration: none; color: #888; font-size: 0.8rem; letter-spacing: 1px; }

        /* Başlık Alanı */
        .song-header { grid-column: 1 / -1; text-align: center; margin-bottom: 20px; }
        h1 { font-size: 2.5rem; margin: 0; font-weight: 700; color: #0D2344; }
        .dark-mode h1 { color: #fff; }
        .artist { color: #888; text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem; margin-top: 10px; }

        /* --- ÜST KONTROL PANELİ (Görsel Örnekteki Gibi) --- */
        .top-controls { 
            grid-column: 1 / -1; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;
        }

        /* Harf Transpoze Sistemi */
        .transpose-letters { display: flex; align-items: center; gap: 5px; }
        .transpose-letters span { font-weight: bold; font-size: 1.1rem; color: #555; cursor: pointer; padding: 5px 10px; border-radius: 4px; transition: 0.2s; }
        .dark-mode .transpose-letters span { color: #bbb; }
        .transpose-letters span:hover { background: rgba(211, 47, 47, 0.1); color: var(--chord); }
        .transpose-letters .active-note { background: var(--chord); color: white !important; }

        /* Yazı Boyutu ve Mod Butonları */
        .right-btns { display: flex; gap: 10px; align-items: center; }
        .btn-box { background: #eee; color: #333; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .dark-mode .btn-box { background: #333; color: #eee; }
        .mode-btn { background: #555; color: white; }

        /* --- SOL TARAF: ŞARKI İÇERİĞİ --- */
        .main-content { border-right: 1px solid var(--border); padding-right: 40px; }
        
        .section-title { font-weight: bold; color: #888; margin-top: 30px; margin-bottom: 10px; font-size: 0.9rem; text-transform: uppercase; }
        
        .intro-block { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 8px; font-family: 'Courier Prime', monospace; font-size: 1.1rem; color: var(--chord); font-weight: bold; }
