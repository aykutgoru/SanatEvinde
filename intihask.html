<!DOCTYPE html>
<html lang="tr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İntihaşk - Onur Can Özcan</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --chord: #d32f2f; --panel: #fcfcfc; --border: #eee; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: 1fr 300px; gap: 40px; }
        
        /* ÜST PANEL */
        .top-panel { grid-column: 1 / -1; background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .transpose-bar span { font-weight: bold; cursor: pointer; padding: 5px 8px; border-bottom: 2px solid transparent; }
        .active-note { color: var(--chord) !important; border-bottom: 2px solid var(--chord) !important; }
        .kolay-btn { background: #d32f2f; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-right: 10px; font-weight: bold; }
        .font-btns button { border: 1px solid #ccc; background: white; padding: 5px 10px; cursor: pointer; font-weight: bold; }

        /* ŞARKI ALANI */
        .lyrics-area { border-right: 1px solid var(--border); padding-right: 30px; }
        .intro-box { background: #f9f9f9; border: 1px dashed #ccc; padding: 15px; margin-bottom: 30px; font-family: 'Courier Prime', monospace; color: var(--chord); font-weight: bold; font-size: 13pt; }
        #chords-container { font-family: 'Courier Prime', monospace; white-space: pre; font-size: 13pt; line-height: 2.2; position: relative; }
        .chord { color: var(--chord); font-weight: bold; position: absolute; margin-top: -1.1em; display: inline-block; }

        .ritim-title { font-weight: bold; color: #2e7d32; display: block; margin-bottom: 15px; font-size: 1.2rem; }
